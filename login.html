<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KPI Dashboard — Accesso</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     oklch(96.5% 0.006 88);
  --card:   oklch(99.5% 0.002 88);
  --border: oklch(89.5% 0.006 88);
  --text:   oklch(18% 0.012 250);
  --text-2: oklch(48% 0.006 250);
  --text-3: oklch(64% 0.005 250);
  --accent: oklch(44% 0.155 265);
  --accent-h: oklch(38% 0.155 265);
  --neg:    oklch(40% 0.19 25);
}

body {
  min-height: 100dvh;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  color: var(--text);
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 44px 40px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 2px 16px oklch(0% 0 0 / 0.06);
}

.logo {
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 32px;
}

.logo-mark {
  width: 38px;
  height: 38px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.logo-mark svg {
  width: 18px;
  height: 18px;
  fill: none;
  stroke: #fff;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.logo-text strong {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}

.logo-text span {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 500;
}

h1 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 13px;
  color: var(--text-2);
  margin-bottom: 26px;
  line-height: 1.45;
}

.field { margin-bottom: 14px; }

label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--text-2);
  margin-bottom: 5px;
}

input {
  display: block;
  width: 100%;
  padding: 9px 12px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 7px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px oklch(44% 0.155 265 / 0.12);
}

button {
  display: block;
  width: 100%;
  margin-top: 22px;
  padding: 10px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: 7px;
  cursor: pointer;
  transition: background 0.15s;
  letter-spacing: 0.1px;
}

button:hover:not(:disabled) { background: var(--accent-h); }
button:disabled { opacity: 0.55; cursor: not-allowed; }

.error {
  display: none;
  margin-top: 14px;
  padding: 9px 12px;
  font-size: 13px;
  color: var(--neg);
  background: oklch(40% 0.19 25 / 0.07);
  border: 1px solid oklch(40% 0.19 25 / 0.18);
  border-radius: 7px;
  line-height: 1.4;
}

.error.visible { display: block; }

.footer {
  margin-top: 28px;
  font-size: 11px;
  color: var(--text-3);
  text-align: center;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <div class="logo-text">
      <strong>KPI Dashboard</strong>
      <span>Analytics Platform</span>
    </div>
  </div>

  <h1>Accedi</h1>
  <p class="subtitle">Inserisci le credenziali ricevute per accedere alla tua dashboard.</p>

  <form id="form" novalidate>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required placeholder="nome@azienda.it">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit" id="btn">Accedi</button>
    <div class="error" id="error"></div>
  </form>

  <p class="footer">Accesso riservato · Per assistenza contatta il tuo referente</p>
</div>

<script>
const form = document.getElementById('form');
const btn  = document.getElementById('btn');
const err  = document.getElementById('error');

form.addEventListener('submit', async e => {
  e.preventDefault();
  err.className = 'error';
  btn.disabled = true;
  btn.textContent = 'Accesso in corso…';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
    });

    const data = await res.json();

    if (!res.ok) {
      err.textContent = data.error || 'Credenziali non valide.';
      err.className = 'error visible';
      btn.disabled = false;
      btn.textContent = 'Accedi';
      return;
    }

    const params = new URLSearchParams(location.search);
    const next   = params.get('next');
    const dashMap = { 'rs-italia': '/rs-italia', 'optimedia': '/optimedia' };
    location.href = next || dashMap[data.dashboard] || '/rs-italia';

  } catch {
    err.textContent = 'Errore di rete. Riprova.';
    err.className = 'error visible';
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
});
</script>
</body>
</html>
